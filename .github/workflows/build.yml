name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generar Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --project-dir .
          echo "Tamaño JAR: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Compilar APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Selune-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
